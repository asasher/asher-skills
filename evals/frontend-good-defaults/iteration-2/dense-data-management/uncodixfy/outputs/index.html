<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Subscribers</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --surface-2: #fbfbf8;
      --line: #deded8;
      --line-strong: #c8c8c0;
      --text: #1f211d;
      --muted: #686a61;
      --faint: #8c8d85;
      --accent: #4f5d45;
      --accent-2: #30372c;
      --danger: #b54a3e;
      --warning: #9b6a22;
      --good: #407344;
      --focus: rgba(79, 93, 69, .24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: #efefea;
      border-right: 1px solid var(--line);
      padding: 18px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      font-weight: 650;
      color: #282a25;
    }

    .mark {
      width: 22px;
      height: 22px;
      border: 1px solid #76786f;
      border-radius: 5px;
      display: grid;
      place-items: center;
      font-size: 13px;
      color: #34372f;
      background: #f8f8f4;
    }

    .nav {
      display: grid;
      gap: 2px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 9px;
      border-radius: 7px;
      color: #454840;
      text-decoration: none;
    }

    .nav a:hover {
      background: #e5e5de;
    }

    .nav a.active {
      background: #deded6;
      color: #1d211a;
      font-weight: 600;
    }

    .nav svg,
    .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: none;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .topbar {
      min-height: 58px;
      padding: 13px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      font-size: 18px;
      line-height: 1.2;
      margin: 0;
      font-weight: 650;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .button {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--text);
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .button:hover {
      background: #f2f2ee;
    }

    .button.primary {
      border-color: var(--accent-2);
      background: var(--accent-2);
      color: #fff;
    }

    .button.primary:hover {
      background: #252b22;
    }

    .controls {
      padding: 14px 24px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto auto;
      gap: 10px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search .icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      pointer-events: none;
    }

    .search input,
    select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search input {
      padding: 0 12px 0 35px;
    }

    select {
      min-width: 152px;
      padding: 0 34px 0 10px;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
      outline: none;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 368px;
    }

    .table-wrap {
      min-width: 0;
      overflow: auto;
      background: var(--surface);
    }

    table {
      width: 100%;
      min-width: 830px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f4f4ef;
      color: #56584f;
      font-size: 12px;
      font-weight: 650;
    }

    tbody tr {
      background: var(--surface);
    }

    tbody tr:hover {
      background: #f8f8f4;
    }

    tbody tr.selected {
      background: #eceee7;
    }

    .subscriber {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 230px;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ded7ca;
      color: #3f382e;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 650;
      flex: none;
    }

    .identity {
      min-width: 0;
    }

    .name {
      font-weight: 600;
      color: var(--text);
    }

    .email {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 6px;
      padding: 2px 7px;
      border: 1px solid var(--line-strong);
      background: #f8f8f5;
      font-size: 12px;
      font-weight: 600;
    }

    .status.active {
      color: var(--good);
      border-color: #abc7aa;
      background: #f1f7ef;
    }

    .status.past-due {
      color: var(--warning);
      border-color: #d6bb86;
      background: #fbf4e7;
    }

    .status.canceled {
      color: var(--danger);
      border-color: #d8aaa4;
      background: #fbf0ee;
    }

    .detail {
      min-width: 0;
      background: #f7f7f2;
      border-left: 1px solid var(--line);
      overflow: auto;
    }

    .detail-inner {
      padding: 18px;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .detail-person {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .detail-person .avatar {
      width: 38px;
      height: 38px;
      font-size: 14px;
    }

    .detail h2 {
      font-size: 16px;
      margin: 0;
      line-height: 1.25;
      font-weight: 650;
    }

    .detail .email {
      max-width: 230px;
    }

    .section {
      border-top: 1px solid var(--line);
      padding: 16px 0;
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section-title {
      font-weight: 650;
      margin-bottom: 10px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
    }

    .field {
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .value {
      color: var(--text);
      font-weight: 560;
      overflow-wrap: anywhere;
    }

    .full {
      grid-column: 1 / -1;
    }

    .events {
      display: grid;
      gap: 10px;
    }

    .event {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      color: var(--text);
    }

    .event time {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .notes {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--surface);
      padding: 9px 10px;
      color: var(--text);
    }

    .empty {
      padding: 36px 24px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .detail {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 680px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      select {
        min-width: 0;
      }
    }
  </style>
</head>

    function initials(name) {
      return name.split(" ").map((part) => part[0]).join("").slice(0, 2);
    }

      return status.toLowerCase().replace(/\s+/g, "-");
    }

    function money(value) {

        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function dateLabel(value) {

    function filteredSubscribers() {
      const term = filters.search.value.trim().toLowerCase();

        ].join(" ").toLowerCase();

        return (!term || haystack.includes(term)) &&
          (filters.segment.value === "all" || subscriber.segment === filters.segment.value) &&
          (filters.plan.value === "all" || subscriber.plan === filters.plan.value) &&
          (filters.status.value === "all" || subscriber.status === filters.status.value);
      });
    }

    function renderRows() {
      const list = filteredSubscribers();
      if (!list.some((subscriber) => subscriber.id === selectedId) && list.length) {
        selectedId = list[0].id;
      }

      rows.innerHTML = list.map((subscriber) => `
        <tr data-id="${subscriber.id}" class="${subscriber.id === selectedId ? "selected" : ""}" tabindex="0">
          <td>
            <div class="subscriber">
              <div class="avatar">${initials(subscriber.name)}</div>
              <div class="identity">
                <div class="name">${subscriber.name}</div>
                <div class="email">${subscriber.email}</div>
              </div>
            </div>
          </td>
          <td>${subscriber.segmentLabel}</td>
          <td>${subscriber.plan}</td>
          <td>${dateLabel(subscriber.renewal)}</td>
          <td class="number">${money(subscriber.mrr)}</td>
          <td><span class="status ${statusClass(subscriber.status)}">${subscriber.status}</span></td>
          <td>${subscriber.source}</td>
        </tr>
      `).join("");

      empty.hidden = list.length > 0;
      renderDetail(list.length ? subscribers.find((subscriber) => subscriber.id === selectedId) : null);
    }

    function renderDetail(subscriber) {
      if (!subscriber) {
        detail.innerHTML = `<div class="empty">Select a different filter to view subscriber details.</div>`;
        return;
      }

      detail.innerHTML = `
        <div class="detail-head">
          <div class="detail-person">
            <div class="avatar">${initials(subscriber.name)}</div>
            <div>
              <h2>${subscriber.name}</h2>
              <div class="email">${subscriber.email}</div>
            </div>
          </div>
          <span class="status ${statusClass(subscriber.status)}">${subscriber.status}</span>
        </div>

        <div class="section">
          <div class="section-title">Subscription</div>
          <div class="fields">
            <div class="field">
              <div class="label">Plan</div>
              <div class="value">${subscriber.plan}</div>
            </div>
            <div class="field">
              <div class="label">MRR</div>
              <div class="value">${money(subscriber.mrr)}</div>
            </div>
            <div class="field">
              <div class="label">Renewal</div>
              <div class="value">${dateLabel(subscriber.renewal)}</div>
            </div>
            <div class="field">
              <div class="label">Seats</div>
              <div class="value">${subscriber.seats}</div>
            </div>
            <div class="field full">
              <div class="label">Payment</div>
              <div class="value">${subscriber.payment}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Account</div>
          <div class="fields">
            <div class="field">
              <div class="label">Company</div>
              <div class="value">${subscriber.company}</div>
            </div>
            <div class="field">
              <div class="label">Segment</div>
              <div class="value">${subscriber.segmentLabel}</div>
            </div>
            <div class="field">
              <div class="label">Joined</div>
              <div class="value">${dateLabel(subscriber.joined)}</div>
            </div>
            <div class="field">
              <div class="label">Owner</div>
              <div class="value">${subscriber.owner}</div>
            </div>
            <div class="field full">
              <div class="label">Source</div>
              <div class="value">${subscriber.source}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Recent activity</div>
          <div class="events">
            ${subscriber.events.map(([date, text]) => `
              <div class="event">
                <time>${date}</time>
                <div>${text}</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="section">
          <div class="section-title">Operator notes</div>
          <textarea class="notes" aria-label="Operator notes">${subscriber.notes}</textarea>
        </div>
      `;
    }

    rows.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-id]");
      if (!row) return;
      selectedId = Number(row.dataset.id);
      renderRows();
    });

    rows.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr[data-id]");
      if (!row) return;
      event.preventDefault();
      selectedId = Number(row.dataset.id);
      renderRows();
    });

    Object.values(filters).forEach((control) => {
      control.addEventListener("input", renderRows);
      control.addEventListener("change", renderRows);
    });

    document.querySelector("#filters").addEventListener("submit", (event) => {
      event.preventDefault();
    });

    renderRows();
  </script>
</body>
</html>
