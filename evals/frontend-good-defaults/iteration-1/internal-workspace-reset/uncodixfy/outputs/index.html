<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Refund Triage</title>
  <style>
    :root {
      --page: #f4f5f3;
      --panel: #ffffff;
      --panel-alt: #f8f8f6;
      --line: #d9ddd7;
      --line-strong: #bfc6bd;
      --text: #202723;
      --muted: #647069;
      --soft: #eef1ed;
      --primary: #0f766e;
      --primary-strong: #0b5f59;
      --danger: #a33a2f;
      --danger-soft: #f7e7e4;
      --warning: #936218;
      --warning-soft: #f6ecd9;
      --success: #21734b;
      --success-soft: #e3f0e8;
      --focus: rgba(15, 118, 110, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--page);
      font-family: "Aptos", "Helvetica Neue", "Nimbus Sans", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
      height: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }

    .product-name {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .team-name {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .workspace {
      display: grid;
      grid-template-columns: 340px minmax(440px, 1fr) 360px;
      min-height: 0;
    }

    .queue-pane,
    .detail-pane,
    .side-pane {
      min-width: 0;
      min-height: 0;
      background: var(--panel);
    }

    .queue-pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-right: 1px solid var(--line);
    }

    .side-pane {
      border-left: 1px solid var(--line);
      overflow: auto;
      background: var(--panel-alt);
    }

    .detail-pane {
      overflow: auto;
    }

    .queue-tools {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .pane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: #46514b;
      font-size: 13px;
      font-weight: 560;
    }

    input,
    select,
    textarea {
      width: 100%;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      outline: none;
    }

    input,
    select {
      height: 34px;
      padding: 0 10px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      padding: 9px 10px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .queue-list {
      overflow: auto;
      background: var(--panel);
    }

    .request-row {
      display: block;
      width: 100%;
      padding: 14px 16px;
      color: inherit;
      text-align: left;
      background: var(--panel);
      border: 0;
      border-bottom: 1px solid var(--line);
      border-left: 3px solid transparent;
      cursor: pointer;
    }

    .request-row:hover {
      background: #fbfbfa;
    }

    .request-row:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: -3px;
    }

    .request-row.active {
      background: var(--soft);
      border-left-color: var(--primary);
    }

    .row-top,
    .row-meta,
    .row-flags,
    .case-header-line,
    .action-row,
    .note-head,
    .activity-row,
    .item-row,
    .check-row {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .row-top {
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .customer-name,
    .case-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 640;
    }

    .amount {
      flex-shrink: 0;
      font-weight: 650;
    }

    .row-meta {
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 9px;
    }

    .row-reason {
      margin-bottom: 9px;
      color: #39423e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-flags {
      justify-content: space-between;
      gap: 8px;
    }

    .badge-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 6px;
      border: 1px solid var(--line-strong);
      color: #3b4741;
      background: #fff;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .badge.new,
    .badge.review {
      color: var(--warning);
      background: var(--warning-soft);
      border-color: #ead5aa;
    }

    .badge.escalated,
    .badge.high {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: #efc5be;
    }

    .badge.approved {
      color: var(--success);
      background: var(--success-soft);
      border-color: #badbc8;
    }

    .badge.denied {
      color: #5c6460;
      background: #ecefed;
      border-color: #d1d8d3;
    }

    .badge.normal {
      color: #4e5c56;
      background: #f3f5f2;
    }

    .detail-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 22px 24px 36px;
    }

    .case-head {
      display: grid;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .case-header-line {
      justify-content: space-between;
      gap: 18px;
    }

    .case-title {
      font-size: 20px;
      line-height: 1.25;
      white-space: normal;
    }

    .case-subtitle {
      color: var(--muted);
    }

    .case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .section {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .summary-text {
      max-width: 760px;
      margin: 0;
      color: #34403a;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .detail-cell {
      min-width: 0;
      padding: 11px 12px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .detail-cell:nth-child(2n) {
      border-right: 0;
    }

    .detail-cell:nth-last-child(-n + 2) {
      border-bottom: 0;
    }

    .detail-label {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-value {
      overflow-wrap: anywhere;
      font-weight: 560;
    }

    .item-list,
    .note-list,
    .activity-list,
    .check-list {
      display: grid;
      gap: 8px;
    }

    .item-row {
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .item-row:last-child {
      border-bottom: 0;
    }

    .item-name {
      min-width: 0;
    }

    .item-name strong {
      display: block;
      font-weight: 600;
    }

    .item-name div {
      color: var(--muted);
      font-size: 13px;
    }

    .item-price {
      flex-shrink: 0;
      font-weight: 620;
    }

    .side-content {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .side-block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .side-block h3 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .action-row {
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 11px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      font-weight: 580;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: #f7f8f6;
      border-color: #aeb7ad;
    }

    .btn.primary {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .btn.primary:hover:not(:disabled) {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .btn.danger {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }

    .btn.danger:hover:not(:disabled) {
      background: #843128;
      border-color: #843128;
    }

    .btn.full {
      width: 100%;
    }

    .decision-fields {
      display: grid;
      gap: 10px;
    }

    .check-row {
      gap: 9px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .check-row:last-child {
      border-bottom: 0;
    }

    .check-row input {
      width: 16px;
      height: 16px;
      margin: 2px 0 0;
      flex: 0 0 auto;
      accent-color: var(--primary);
    }

    .check-copy {
      min-width: 0;
    }

    .check-title {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .check-copy div {
      color: var(--muted);
      font-size: 13px;
    }

    .note-card,
    .activity-card {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .note-card:last-child,
    .activity-card:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .note-head,
    .activity-row {
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }

    .note-author,
    .activity-type {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 620;
    }

    .note-time,
    .activity-time {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .note-body,
    .activity-body {
      color: #3b4640;
      overflow-wrap: anywhere;
    }

    .empty-state {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
    }

    .side-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .decision-state {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-alt);
      color: #34403a;
    }

    .decision-state strong {
      display: block;
      margin-bottom: 3px;
      font-weight: 650;
    }

    @media (max-width: 1160px) {
      .workspace {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .side-pane {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .side-content {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
      }

      .side-block.notes-block {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      body {
        height: auto;
      }

      .app {
        display: block;
        height: auto;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        height: auto;
        padding: 12px 14px;
      }

      .topbar-actions {
        width: 100%;
      }

      .topbar-actions .btn {
        flex: 1;
      }

      .workspace {
        display: block;
      }

      .queue-pane {
        display: block;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .queue-list {
        max-height: 430px;
      }

      .detail-content {
        padding: 18px 14px 28px;
      }

      .case-header-line {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .detail-grid,
      .side-content {
        grid-template-columns: 1fr;
      }

      .detail-cell,
      .detail-cell:nth-child(2n),
      .detail-cell:nth-last-child(-n + 2) {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .detail-cell:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="product-name">
        <h1>Refund triage</h1>
        <div class="team-name">Support Operations</div>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="assignButton" type="button">Assign to me</button>
        <button class="btn" id="copyLinkButton" type="button">Copy case link</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="queue-pane" aria-label="Refund request queue">
        <div class="queue-tools">
          <div class="pane-title">
            <h2>Queue</h2>
            <div class="result-count" id="resultCount"></div>
          </div>
          <div class="field">
            <label for="searchInput">Search requests</label>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Customer, order, or case ID">
          </div>
          <div class="filter-grid">
            <div class="field">
              <label for="statusFilter">Status</label>
              <select id="statusFilter">
                <option value="all">All open and closed</option>
                <option value="open">Open only</option>
                <option value="New">New</option>
                <option value="Needs review">Needs review</option>
                <option value="Escalated">Escalated</option>
                <option value="Approved">Approved</option>
                <option value="Denied">Denied</option>
              </select>
            </div>
            <div class="field">
              <label for="priorityFilter">Priority</label>
              <select id="priorityFilter">
                <option value="all">Any priority</option>
                <option value="High">High</option>
                <option value="Normal">Normal</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <div class="field">
              <label for="reasonFilter">Reason</label>
              <select id="reasonFilter">
                <option value="all">Any reason</option>
                <option value="Damaged item">Damaged item</option>
                <option value="Duplicate charge">Duplicate charge</option>
                <option value="Missing item">Missing item</option>
                <option value="Late delivery">Late delivery</option>
                <option value="Wrong item">Wrong item</option>
                <option value="Subscription renewal">Subscription renewal</option>
              </select>
            </div>
            <div class="field">
              <label for="amountFilter">Amount</label>
              <select id="amountFilter">
                <option value="all">Any amount</option>
                <option value="under50">Under $50</option>
                <option value="50to150">$50 to $150</option>
                <option value="over150">Over $150</option>
              </select>
            </div>
          </div>
        </div>
        <div class="queue-list" id="queueList"></div>
      </aside>

      <section class="detail-pane" aria-label="Refund request details">
        <div class="detail-content" id="detailContent"></div>
      </section>

      <aside class="side-pane" aria-label="Refund workflow">
        <div class="side-content" id="sideContent"></div>
      </aside>
    </main>
  </div>

    const state = {
      selectedId: requests[0].id,
      filters: {
        search: "",
        status: "open",
        priority: "all",
        reason: "all",
        amount: "all"
      }
    };

    const els = {
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      priorityFilter: document.getElementById("priorityFilter"),
      reasonFilter: document.getElementById("reasonFilter"),
      amountFilter: document.getElementById("amountFilter"),
      queueList: document.getElementById("queueList"),
      resultCount: document.getElementById("resultCount"),
      detailContent: document.getElementById("detailContent"),
      sideContent: document.getElementById("sideContent"),
      assignButton: document.getElementById("assignButton"),
      copyLinkButton: document.getElementById("copyLinkButton")
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(value);
    }

    function formatDateTime(value) {
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function statusClass(status) {
      return status.toLowerCase().replace(/\s+/g, "-").replace("needs-review", "review");
    }

    function isOpenStatus(status) {
      return status === "New" || status === "Needs review" || status === "Escalated";
    }

    function amountMatches(value, filter) {
      if (filter === "under50") return value < 50;
      if (filter === "50to150") return value >= 50 && value <= 150;
      if (filter === "over150") return value > 150;
      return true;
    }

    function getFilteredRequests() {
      const query = state.filters.search.trim().toLowerCase();
      return requests.filter((request) => {
        const searchable = [
          request.id,
          request.customer,
          request.email,
          request.orderId,
          request.reason
        ].join(" ").toLowerCase();

        const statusMatch = state.filters.status === "all"
          || request.status === state.filters.status
          || (state.filters.status === "open" && isOpenStatus(request.status));

        return (!query || searchable.includes(query))
          && statusMatch
          && (state.filters.priority === "all" || request.priority === state.filters.priority)
          && (state.filters.reason === "all" || request.reason === state.filters.reason)
          && amountMatches(request.amount, state.filters.amount);
      });
    }

    function getSelectedRequest() {
      return requests.find((request) => request.id === state.selectedId) || null;
    }

    function renderQueue() {
      const filtered = getFilteredRequests();
      els.resultCount.textContent = `${filtered.length} ${filtered.length === 1 ? "request" : "requests"}`;

      if (filtered.length > 0 && !filtered.some((request) => request.id === state.selectedId)) {
        state.selectedId = filtered[0].id;
      }

      if (filtered.length === 0) {
        els.queueList.innerHTML = '<div class="empty-state">No requests match these filters.</div>';
        return;
      }

      els.queueList.innerHTML = filtered.map((request) => `
        <div class="request-row ${request.id === state.selectedId ? "active" : ""}" role="button" tabindex="0" data-select="${escapeHtml(request.id)}">
          <div class="row-top">
            <div class="customer-name">${escapeHtml(request.customer)}</div>
            <div class="amount">${formatMoney(request.amount)}</div>
          </div>
          <div class="row-meta">
            <div>${escapeHtml(request.id)}</div>
            <div>${escapeHtml(request.orderId)}</div>
            <div>${formatDateTime(request.requestedAt)}</div>
          </div>
          <div class="row-reason">${escapeHtml(request.reason)}</div>
          <div class="row-flags">
            <div class="badge-group">
              <div class="badge ${statusClass(request.status)}">${escapeHtml(request.status)}</div>
              <div class="badge ${request.priority.toLowerCase()}">${escapeHtml(request.priority)}</div>
            </div>
            <div class="result-count">${escapeHtml(request.assignee)}</div>
          </div>
        </div>
      `).join("");
    }

    function renderDetail(request) {
      if (!request) {
        els.detailContent.innerHTML = '<div class="empty-state">Select a request to review details.</div>';
        return;
      }

      const itemRows = request.items.map((item) => `
        <div class="item-row">
          <div class="item-name">
            <strong>${escapeHtml(item.name)}</strong>
            <div>${escapeHtml(item.sku)} · Qty ${escapeHtml(item.quantity)}</div>
          </div>
          <div class="item-price">${formatMoney(item.price)}</div>
        </div>
      `).join("");

      const attachments = request.attachments.length
        ? request.attachments.map((name) => `<div class="badge">${escapeHtml(name)}</div>`).join("")
        : '<div class="result-count">No attachments</div>';

      els.detailContent.innerHTML = `
        <div class="case-head">
          <div class="case-header-line">
            <div>
              <div class="case-title">${escapeHtml(request.customer)} · ${escapeHtml(request.id)}</div>
              <div class="case-subtitle">${escapeHtml(request.email)} · ${escapeHtml(request.orderId)}</div>
            </div>
            <div class="badge-group">
              <div class="badge ${statusClass(request.status)}">${escapeHtml(request.status)}</div>
              <div class="badge ${request.priority.toLowerCase()}">${escapeHtml(request.priority)}</div>
            </div>
          </div>
          <div class="case-meta">
            <div class="badge">${escapeHtml(request.reason)}</div>
            <div class="badge">${escapeHtml(request.channel)}</div>
            <div class="badge">${formatMoney(request.amount)}</div>
          </div>
        </div>

        <section class="section">
          <h3>Customer request</h3>
          <p class="summary-text">${escapeHtml(request.summary)}</p>
        </section>

        <section class="section">
          <h3>Case details</h3>
          <div class="detail-grid">
            <div class="detail-cell">
              <div class="detail-label">Payment method</div>
              <div class="detail-value">${escapeHtml(request.payment)}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Assigned to</div>
              <div class="detail-value">${escapeHtml(request.assignee)}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Purchased</div>
              <div class="detail-value">${escapeHtml(request.purchasedAt)}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Delivered</div>
              <div class="detail-value">${escapeHtml(request.deliveredAt)}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Account since</div>
              <div class="detail-value">${escapeHtml(request.history.accountSince)}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Customer history</div>
              <div class="detail-value">${request.history.completedOrders} orders, ${request.history.previousRefunds} refunds, ${request.history.chargebacks} chargebacks</div>
            </div>
          </div>
        </section>

        <section class="section">
          <h3>Policy context</h3>
          <p class="summary-text">${escapeHtml(request.policy)}</p>
        </section>

        <section class="section">
          <h3>Order items</h3>
          <div class="item-list">${itemRows}</div>
        </section>

        <section class="section">
          <h3>Attachments</h3>
          <div class="badge-group">${attachments}</div>
        </section>
      `;
    }

    function renderSidePanel(request) {
      if (!request) {
        els.sideContent.innerHTML = "";
        return;
      }

      const checks = request.checks.map((check, index) => `
        <div class="check-row">
          <input id="check-${index}" type="checkbox" data-check="${index}" ${check.done ? "checked" : ""}>
          <div class="check-copy">
            <label class="check-title" for="check-${index}">${escapeHtml(check.title)}</label>
            <div>${escapeHtml(check.detail)}</div>
          </div>
        </div>
      `).join("");

      const notes = request.notes.length
        ? request.notes.map((note) => `
          <div class="note-card">
            <div class="note-head">
              <div class="note-author">${escapeHtml(note.author)}</div>
              <div class="note-time">${escapeHtml(note.time)}</div>
            </div>
            <div class="note-body">${escapeHtml(note.body)}</div>
          </div>
        `).join("")
        : '<div class="empty-state">No internal notes yet.</div>';

      const activity = request.activity.map((entry) => `
        <div class="activity-card">
          <div class="activity-row">
            <div class="activity-type">${escapeHtml(entry.type)}</div>
            <div class="activity-time">${escapeHtml(entry.time)}</div>
          </div>
          <div class="activity-body">${escapeHtml(entry.body)}</div>
        </div>
      `).join("");

      const isFinal = request.status === "Approved" || request.status === "Denied";
      const decisionText = isFinal
        ? `<div class="decision-state"><strong>Decision recorded</strong>${escapeHtml(request.status)} by ${escapeHtml(request.assignee)}.</div>`
        : `<div class="decision-state"><strong>Ready for review</strong>Complete the checklist, add a note if needed, then approve or deny.</div>`;

      els.sideContent.innerHTML = `
        <section class="side-block">
          <h3>Decision</h3>
          ${decisionText}
          <div class="decision-fields" style="margin-top: 12px;">
            <div class="field">
              <label for="decisionReason">Decision reason</label>
              <select id="decisionReason">
                <option value="Policy eligible">Policy eligible</option>
                <option value="Outside policy">Outside policy</option>
                <option value="Insufficient evidence">Insufficient evidence</option>
                <option value="Duplicate payment not captured">Duplicate payment not captured</option>
                <option value="Escalated for exception">Escalated for exception</option>
              </select>
            </div>
            <div class="field">
              <label for="resolutionNote">Resolution note</label>
              <textarea id="resolutionNote" placeholder="Optional note added to the case timeline"></textarea>
            </div>
          </div>
          <div class="action-row">
            <button class="btn primary full" type="button" data-decision="Approved" ${request.status === "Approved" ? "disabled" : ""}>Approve</button>
            <button class="btn danger full" type="button" data-decision="Denied" ${request.status === "Denied" ? "disabled" : ""}>Deny</button>
          </div>
          <div class="action-row">
            <button class="btn full" type="button" data-decision="Escalated" ${request.status === "Escalated" ? "disabled" : ""}>Escalate</button>
          </div>
        </section>

        <section class="side-block">
          <h3>Review checklist</h3>
          <div class="check-list">${checks}</div>
        </section>

        <section class="side-block notes-block">
          <h3>Internal notes</h3>
          <div class="field">
            <label for="noteText">Add note</label>
            <textarea id="noteText" placeholder="Write a note for the next agent"></textarea>
          </div>
          <div class="action-row">
            <button class="btn" type="button" id="addNoteButton">Add note</button>
          </div>
          <div class="note-list" style="margin-top: 12px;">${notes}</div>
        </section>

        <section class="side-block">
          <h3>Timeline</h3>
          <div class="activity-list">${activity}</div>
        </section>
      `;
    }

    function renderAll() {
      renderQueue();
      const request = getSelectedRequest();
      renderDetail(request);
      renderSidePanel(request);
    }

    function nowStamp() {
      const now = new Date();
      const date = new Intl.DateTimeFormat("en-CA", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(now);
      const time = new Intl.DateTimeFormat("en-US", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);
      return `${date} ${time}`;
    }

    function addActivity(request, type, body) {
      request.activity.unshift({
        type,
        time: nowStamp(),
        body
      });
    }

    function addNote(request, body) {
      request.notes.unshift({
        author: CURRENT_USER,
        time: nowStamp(),
        body
      });
    }

    function setDecision(request, nextStatus) {
      const reason = document.getElementById("decisionReason")?.value || "Policy eligible";
      const note = document.getElementById("resolutionNote")?.value.trim();
      request.status = nextStatus;
      request.assignee = CURRENT_USER;

      const verb = nextStatus === "Approved" ? "approved" : nextStatus === "Denied" ? "denied" : "escalated";
      addActivity(request, `Request ${verb}`, `${CURRENT_USER} ${verb} the request. Reason: ${reason}.`);

      if (note) {
        addNote(request, note);
      }

      renderAll();
    }

    els.queueList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-select]");
      if (!button) return;
      state.selectedId = button.dataset.select;
      renderAll();
    });

    els.queueList.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("[data-select]");
      if (!row) return;
      event.preventDefault();
      state.selectedId = row.dataset.select;
      renderAll();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.filters.search = event.target.value;
      renderAll();
    });

    [els.statusFilter, els.priorityFilter, els.reasonFilter, els.amountFilter].forEach((select) => {
      select.addEventListener("change", (event) => {
        const key = event.target.id.replace("Filter", "");
        state.filters[key] = event.target.value;
        renderAll();
      });
    });

    els.sideContent.addEventListener("click", (event) => {
      const request = getSelectedRequest();
      if (!request) return;

      const decisionButton = event.target.closest("[data-decision]");
      if (decisionButton) {
        setDecision(request, decisionButton.dataset.decision);
        return;
      }

      if (event.target.id === "addNoteButton") {
        const noteText = document.getElementById("noteText");
        const body = noteText.value.trim();
        if (!body) {
          noteText.focus();
          return;
        }
        addNote(request, body);
        addActivity(request, "Note added", `${CURRENT_USER} added an internal note.`);
        renderAll();
      }
    });

    els.sideContent.addEventListener("change", (event) => {
      const request = getSelectedRequest();
      if (!request || !event.target.matches("[data-check]")) return;
      const check = request.checks[Number(event.target.dataset.check)];
      check.done = event.target.checked;
      addActivity(request, "Checklist updated", `${CURRENT_USER} marked "${check.title}" as ${check.done ? "complete" : "incomplete"}.`);
      renderAll();
    });

    els.assignButton.addEventListener("click", () => {
      const request = getSelectedRequest();
      if (!request) return;
      request.assignee = CURRENT_USER;
      addActivity(request, "Assignment changed", `${CURRENT_USER} assigned the case to themselves.`);
      renderAll();
    });

    els.copyLinkButton.addEventListener("click", async () => {
      const request = getSelectedRequest();
      if (!request) return;
      const link = `${location.href.split("#")[0]}#${request.id}`;
      try {
        await navigator.clipboard.writeText(link);
        els.copyLinkButton.textContent = "Copied";
        setTimeout(() => {
          els.copyLinkButton.textContent = "Copy case link";
        }, 1200);
      } catch {
        location.hash = request.id;
      }
    });

    window.addEventListener("hashchange", () => {
      const id = location.hash.replace("#", "");
      if (requests.some((request) => request.id === id)) {
        state.selectedId = id;
        renderAll();
      }
    });

    const initialHash = location.hash.replace("#", "");
    if (requests.some((request) => request.id === initialHash)) {
      state.selectedId = initialHash;
    }

    els.statusFilter.value = state.filters.status;
    renderAll();
  </script>
</body>
</html>
