<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Refund Triage</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f2;
      --surface: #ffffff;
      --surface-soft: #f8faf7;
      --surface-raised: #fcfdfb;
      --ink: #1b211e;
      --text: #2d342f;
      --muted: #69716b;
      --quiet: #8a918b;
      --line: #d8ded7;
      --line-strong: #bdc7bf;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --primary-soft: #e0f0ec;
      --warning: #9a5b13;
      --warning-soft: #f5ead7;
      --danger: #b42318;
      --danger-dark: #931a12;
      --danger-soft: #f9e2df;
      --neutral-soft: #eef1ed;
      --focus: 0 0 0 3px rgba(15, 118, 110, 0.18);
      --shadow: 0 10px 30px rgba(27, 33, 30, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Aptos", "Avenir Next", "Helvetica Neue", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      min-height: 64px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .product {
      display: flex;
      align-items: baseline;
      gap: 16px;
      min-width: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      color: var(--ink);
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .team-note {
      color: var(--muted);
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sync-text {
      color: var(--muted);
      white-space: nowrap;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(420px, 1fr) minmax(300px, 340px);
      gap: 0;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      background: var(--surface);
    }

    .queue-pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-right: 1px solid var(--line);
      background: var(--surface-raised);
    }

    .detail-pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--surface);
    }

    .decision-pane {
      border-left: 1px solid var(--line);
      background: var(--surface-raised);
      overflow: auto;
    }

    .pane-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
    }

    .header-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-title {
      color: var(--ink);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
    }

    .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .filters {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      color: var(--quiet);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 0 12px 0 36px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    select,
    textarea {
      width: 100%;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
    }

    select {
      height: 36px;
      padding: 0 30px 0 10px;
    }

    textarea {
      min-height: 104px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--primary);
      box-shadow: var(--focus);
      outline: none;
    }

    .queue-list {
      min-height: 0;
      overflow: auto;
    }

    .queue-item {
      width: 100%;
      padding: 15px 20px;
      display: grid;
      gap: 8px;
      text-align: left;
      color: inherit;
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-left: 3px solid transparent;
      border-radius: 0;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .queue-item:hover {
      background: #f0f5f1;
    }

    .queue-item.is-active {
      background: #eaf3ef;
      border-left-color: var(--primary);
    }

    .queue-main,
    .request-title-line,
    .total-line,
    .decision-actions,
    .note-meta,
    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .queue-name {
      min-width: 0;
      color: var(--ink);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-amount,
    .amount {
      color: var(--ink);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .queue-meta {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .queue-reason,
    .queue-order {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      color: var(--ink);
      background: var(--neutral-soft);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
    }

    .status.new,
    .status.review {
      border-color: #bdd9d2;
      background: var(--primary-soft);
      color: #124c47;
    }

    .status.escalated {
      border-color: #e2c792;
      background: var(--warning-soft);
      color: #6a3d0b;
    }

    .status.approved {
      border-color: #b9d9ca;
      background: #e4f3e9;
      color: #1f5a39;
    }

    .status.denied {
      border-color: #e8b4ad;
      background: var(--danger-soft);
      color: #842017;
    }

    .detail-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .detail-heading {
      display: grid;
      gap: 10px;
    }

    .request-title-line {
      align-items: flex-start;
    }

    .customer-block {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .customer-name {
      color: var(--ink);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .customer-subtitle,
    .muted {
      color: var(--muted);
    }

    .detail-scroll {
      min-height: 0;
      overflow: auto;
      padding: 24px;
      display: grid;
      gap: 24px;
      align-content: start;
    }

    .section {
      display: grid;
      gap: 12px;
    }

    .section-title {
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface-raised);
    }

    .summary-cell {
      min-width: 0;
      padding: 14px;
      display: grid;
      gap: 5px;
      border-right: 1px solid var(--line);
    }

    .summary-cell:last-child {
      border-right: 0;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      color: var(--ink);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .policy-box,
    .customer-note,
    .empty-state,
    .decision-card,
    .notes-composer {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-raised);
    }

    .policy-box,
    .customer-note {
      padding: 14px;
    }

    .policy-box {
      display: grid;
      gap: 10px;
    }

    .policy-box.needs-review {
      border-color: #e2c792;
      background: #fff9ed;
    }

    .policy-line {
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .policy-line svg {
      width: 17px;
      height: 17px;
      margin-top: 1px;
      flex: 0 0 auto;
      color: var(--warning);
    }

    .facts {
      display: grid;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .fact-row {
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      min-height: 42px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .fact-row:last-child {
      border-bottom: 0;
    }

    .fact-label {
      padding: 11px 12px;
      color: var(--muted);
      background: var(--surface-soft);
      border-right: 1px solid var(--line);
    }

    .fact-value {
      padding: 11px 12px;
      color: var(--ink);
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .timeline {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 136px minmax(0, 1fr);
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .timeline-row:last-child {
      border-bottom: 0;
    }

    .timeline-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .notes-list {
      display: grid;
      gap: 10px;
    }

    .note {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
      display: grid;
      gap: 7px;
    }

    .note-author {
      color: var(--ink);
      font-weight: 700;
    }

    .note-time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .notes-composer {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .char-count {
      color: var(--muted);
      font-size: 12px;
    }

    .decision-wrap {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .decision-card {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .decision-card h2 {
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
    }

    .decision-card p {
      color: var(--muted);
    }

    .decision-actions {
      align-items: stretch;
    }

    .btn {
      min-height: 38px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: var(--radius);
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      line-height: 1.2;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, opacity 140ms ease;
    }

    .btn:hover:not(:disabled) {
      background: var(--surface-soft);
      border-color: #9dac9f;
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover:not(:disabled) {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    .btn.danger {
      border-color: var(--danger);
      background: var(--danger);
      color: #ffffff;
    }

    .btn.danger:hover:not(:disabled) {
      border-color: var(--danger-dark);
      background: var(--danger-dark);
    }

    .btn.quiet {
      font-weight: 600;
      background: transparent;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .btn:disabled {
      opacity: 0.55;
    }

    .decision-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .decision-list li {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .decision-list li:last-child {
      border-bottom: 0;
    }

    .decision-list span:first-child {
      color: var(--muted);
    }

    .decision-list span:last-child {
      color: var(--ink);
      text-align: right;
      font-weight: 600;
    }

    .decision-history {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: grid;
      gap: 3px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .history-item:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .history-title {
      color: var(--ink);
      font-weight: 700;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 40px));
      padding: 12px 14px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .empty-state {
      margin: 18px;
      padding: 18px;
      display: grid;
      gap: 12px;
      color: var(--muted);
    }

    .empty-state strong {
      color: var(--ink);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: minmax(300px, 350px) minmax(420px, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .decision-pane {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .decision-wrap {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: start;
      }
    }

    @media (max-width: 820px) {
      .app {
        min-height: auto;
      }

      .topbar {
        min-height: auto;
        padding: 16px;
        align-items: flex-start;
        flex-direction: column;
      }

      .product {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
      }

      .workspace {
        display: block;
      }

      .queue-pane,
      .detail-pane,
      .decision-pane {
        min-height: auto;
        border-right: 0;
        border-left: 0;
      }

      .queue-list {
        max-height: 460px;
      }

      .detail-scroll {
        padding: 18px 16px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .summary-cell {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary-cell:last-child {
        border-bottom: 0;
      }

      .fact-row,
      .timeline-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .fact-label {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .timeline-time {
        margin-bottom: 4px;
      }

      .decision-wrap {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }

    @media (max-width: 520px) {
      .filter-grid,
      .decision-actions,
      .composer-footer,
      .request-title-line {
        grid-template-columns: 1fr;
        display: grid;
      }

      .top-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .sync-text {
        white-space: normal;
      }

      .pane-header,
      .detail-header {
        padding-left: 16px;
        padding-right: 16px;
      }

      .customer-name {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="product">
        <h1>Refund triage</h1>
        <p class="team-note">Support operations / North America queue</p>
      </div>
      <div class="top-actions">
        <p class="sync-text" id="syncText">12 requests loaded</p>
        <button class="btn quiet" id="resetAllBtn" type="button">Reset sample data</button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane queue-pane" aria-label="Refund request queue">
        <div class="pane-header">
          <div class="header-line">
            <h2 class="header-title">Queue</h2>
            <p class="count" id="queueCount">0 shown</p>
          </div>

          <div class="filters" aria-label="Queue filters">
            <div class="search-wrap">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
              </svg>
              <label class="sr-only" for="searchInput">Search requests</label>
              <input class="search-input" id="searchInput" type="search" placeholder="Search customer, order, reason">
            </div>
            <div class="filter-grid">
              <div class="field">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                  <option value="all">All open and closed</option>
                  <option value="New">New</option>
                  <option value="Needs review">Needs review</option>
                  <option value="Escalated">Escalated</option>
                  <option value="Approved">Approved</option>
                  <option value="Denied">Denied</option>
                </select>
              </div>
              <div class="field">
                <label for="priorityFilter">Priority</label>
                <select id="priorityFilter">
                  <option value="all">All priorities</option>
                  <option value="High">High</option>
                  <option value="Standard">Standard</option>
                  <option value="Low">Low</option>
                </select>
              </div>
              <div class="field">
                <label for="reasonFilter">Reason</label>
                <select id="reasonFilter">
                  <option value="all">All reasons</option>
                  <option value="Duplicate charge">Duplicate charge</option>
                  <option value="Item not received">Item not received</option>
                  <option value="Service issue">Service issue</option>
                  <option value="Late cancellation">Late cancellation</option>
                  <option value="Billing adjustment">Billing adjustment</option>
                  <option value="Fraud review">Fraud review</option>
                </select>
              </div>
              <div class="field">
                <label for="amountFilter">Amount</label>
                <select id="amountFilter">
                  <option value="all">Any amount</option>
                  <option value="under100">Under $100</option>
                  <option value="100to500">$100 to $500</option>
                  <option value="over500">Over $500</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="queue-list" id="queueList"></div>
      </section>

      <section class="pane detail-pane" aria-label="Selected request details">
        <div class="detail-header" id="detailHeader"></div>
        <div class="detail-scroll" id="detailScroll"></div>
      </section>

      <aside class="pane decision-pane" aria-label="Decision tools">
        <div class="decision-wrap" id="decisionWrap"></div>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const initialRequests = [
      {
        id: "RF-10483",
        customer: "Marisol Chen",
        email: "marisol.chen@example.com",
        tier: "Business Plus",
        orderId: "ORD-887214",
        amount: 248.00,
        submittedAt: "2026-06-10T08:18:00+04:00",
        status: "New",
        priority: "High",
        reason: "Duplicate charge",
        channel: "Chat",
        product: "Annual collaboration workspace",
        payment: "Visa ending 0426",
        purchaseDate: "2026-06-09",
        sla: "Due in 2h 15m",
        assigned: "Unassigned",

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(value);
    }

    function statusClass(status) {
      return status.toLowerCase().replace(/\s+/g, "-").replace("needs-review", "review");
    }

    function formatSubmitted(value) {
      const date = new Date(value);
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function getSelectedRequest() {
      return state.requests.find((request) => request.id === state.selectedId) || state.requests[0];
    }

    function getFilteredRequests() {
      const search = state.filters.search.trim().toLowerCase();
      return state.requests
        .filter((request) => {
          const searchable = [
            request.id,
            request.customer,
            request.email,
            request.orderId,
            request.reason,
            request.product,
            request.customerMessage
          ].join(" ").toLowerCase();

          const matchesSearch = search === "" || searchable.includes(search);
          const matchesStatus = state.filters.status === "all" || request.status === state.filters.status;
          const matchesPriority = state.filters.priority === "all" || request.priority === state.filters.priority;
          const matchesReason = state.filters.reason === "all" || request.reason === state.filters.reason;
          const matchesAmount =
            state.filters.amount === "all" ||
            (state.filters.amount === "under100" && request.amount < 100) ||
            (state.filters.amount === "100to500" && request.amount >= 100 && request.amount <= 500) ||
            (state.filters.amount === "over500" && request.amount > 500);

          return matchesSearch && matchesStatus && matchesPriority && matchesReason && matchesAmount;
        })
        .sort((a, b) => {
          const rank = { High: 0, Standard: 1, Low: 2 };
          const statusRank = { Escalated: 0, New: 1, "Needs review": 2, Approved: 3, Denied: 4 };
          return statusRank[a.status] - statusRank[b.status] || rank[a.priority] - rank[b.priority] || b.amount - a.amount;
        });
    }

    function renderQueue() {
      const filtered = getFilteredRequests();
      queueCount.textContent = `${filtered.length} shown`;
      syncText.textContent = `${state.requests.length} requests loaded`;

      if (!filtered.length) {
        queueList.innerHTML = `
          <div class="empty-state">
            <strong>No requests match these filters.</strong>
            <p>Clear one or more filters to return to the full refund queue.</p>
            <button class="btn" type="button" data-action="clear-filters">Clear filters</button>
          </div>
        `;
        return;
      }

      queueList.innerHTML = filtered.map((request) => `
        <button class="queue-item ${request.id === state.selectedId ? "is-active" : ""}" type="button" data-id="${request.id}">
          <span class="queue-main">

              <option value="Insufficient evidence">Insufficient evidence</option>
              <option value="Risk review hold">Risk review hold</option>
              <option value="Carrier or vendor claim denied">Carrier or vendor claim denied</option>
            </select>
          </div>
          <div class="decision-actions">
            <button class="btn primary" type="button" id="approveBtn" ${isClosed ? "disabled" : ""}>
              ${checkIcon()}Approve
            </button>
            <button class="btn danger" type="button" id="denyBtn" ${isClosed ? "disabled" : ""}>
              ${xIcon()}Deny
            </button>
          </div>
        </section>

        <section class="decision-card">
          <div>
            <h2>Next handling</h2>
            <p>Use these fields to keep the queue state clear for the next teammate.</p>
          </div>
          <div class="field">
            <label for="ownerSelect">Assign owner</label>
            <select id="ownerSelect">
              <option ${request.assigned === "Unassigned" ? "selected" : ""}>Unassigned</option>
              <option ${request.assigned === "Nora Ali" ? "selected" : ""}>Nora Ali</option>
              <option ${request.assigned === "Priya Singh" ? "selected" : ""}>Priya Singh</option>
              <option ${request.assigned === "Iris Morgan" ? "selected" : ""}>Iris Morgan</option>
              <option ${request.assigned === "Marco Bell" ? "selected" : ""}>Marco Bell</option>
              <option ${request.assigned === "Quinn Roberts" ? "selected" : ""}>Quinn Roberts</option>
            </select>
          </div>
          <div class="field">
            <label for="statusSelect">Set status</label>
            <select id="statusSelect" ${isClosed ? "disabled" : ""}>
              ${["New", "Needs review", "Escalated"].map((status) => `
                <option value="${status}" ${request.status === status ? "selected" : ""}>${status}</option>
              `).join("")}
            </select>
          </div>
        </section>

        <section class="decision-card">
          <div>
            <h2>History</h2>
            <p>Recent actions for the selected request.</p>
          </div>
          <div class="decision-history">
            ${request.history.map((item) => `
              <div class="history-item">
                <span class="history-title">${item}</span>
                <span class="muted">${request.id}</span>
              </div>
            `).join("")}
          </div>
        </section>
      `;

      document.querySelector("#approveBtn")?.addEventListener("click", () => decide("Approved"));
      document.querySelector("#denyBtn")?.addEventListener("click", () => decide("Denied"));
      document.querySelector("#ownerSelect")?.addEventListener("change", (event) => {
        request.assigned = event.target.value;
        request.history.unshift(`Assigned to ${request.assigned}`);
        showToast(`${request.id} assigned to ${request.assigned}.`);
        render();
      });
      document.querySelector("#statusSelect")?.addEventListener("change", (event) => {
        request.status = event.target.value;
        request.history.unshift(`Status changed to ${request.status}`);
        showToast(`${request.id} moved to ${request.status}.`);
        render();
      });
    }

    function checkIcon() {
      return `
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 6 9 17l-5-5"></path>
        </svg>
      `;
    }

    function xIcon() {
      return `
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      `;
    }

    function bindNoteForm() {
      const noteForm = document.querySelector("#noteForm");
      const noteInput = document.querySelector("#noteInput");
      const addNoteBtn = document.querySelector("#addNoteBtn");
      const charCount = document.querySelector("#charCount");

      noteInput.addEventListener("input", () => {
        const length = noteInput.value.trim().length;
        charCount.textContent = `${noteInput.value.length} / 500`;
        addNoteBtn.disabled = length < 3;
      });

      noteForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const body = noteInput.value.trim();
        if (body.length < 3) return;

        const request = getSelectedRequest();
        request.notes.unshift({
          author: "You",
          time: "Just now",
          body
        });
        request.history.unshift("Internal note added");
        showToast(`Note added to ${request.id}.`);
        render();
      });
    }

    function decide(outcome) {
      const request = getSelectedRequest();
      if (request.status === "Approved" || request.status === "Denied") return;

      const denyReason = document.querySelector("#denyReason")?.value || "Outside refund policy";
      request.status = outcome;
      request.assigned = request.assigned === "Unassigned" ? "You" : request.assigned;
      request.sla = "Closed";

      const historyText = outcome === "Approved"
        ? `Approved by ${request.assigned}`
        : `Denied by ${request.assigned}: ${denyReason}`;
      request.history.unshift(historyText);
      request.notes.unshift({
        author: "You",
        time: "Just now",
        body: outcome === "Approved"
          ? `Approved ${formatMoney(request.amount)} refund to ${request.payment}.`
          : `Denied refund. Reason: ${denyReason}.`
      });

      showToast(`${request.id} ${outcome.toLowerCase()}.`);
      render();
    }

    function clearFilters() {
      state.filters = {
        search: "",
        status: "all",
        priority: "all",
        reason: "all",
        amount: "all"
      };
      searchInput.value = "";
      statusFilter.value = "all";
      priorityFilter.value = "all";
      reasonFilter.value = "all";
      amountFilter.value = "all";
      render();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 2600);
    }

    function render() {
      renderQueue();
      renderDetail();
      renderDecision();
    }

    queueList.addEventListener("click", (event) => {
      const clearButton = event.target.closest("[data-action='clear-filters']");
      if (clearButton) {
        clearFilters();
        return;
      }

      const item = event.target.closest(".queue-item");
      if (!item) return;
      state.selectedId = item.dataset.id;
      render();
    });

    searchInput.addEventListener("input", (event) => {
      state.filters.search = event.target.value;
      renderQueue();
    });

    statusFilter.addEventListener("change", (event) => {
      state.filters.status = event.target.value;
      renderQueue();
    });

    priorityFilter.addEventListener("change", (event) => {
      state.filters.priority = event.target.value;
      renderQueue();
    });

    reasonFilter.addEventListener("change", (event) => {
      state.filters.reason = event.target.value;
      renderQueue();
    });

    amountFilter.addEventListener("change", (event) => {
      state.filters.amount = event.target.value;
      renderQueue();
    });

    resetAllBtn.addEventListener("click", () => {
      state.requests = structuredClone(initialRequests);
      state.selectedId = "RF-10483";
      clearFilters();
      showToast("Sample data reset.");
    });

    render();
  </script>
</body>
</html>
