<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subscriber Admin</title>
  <style>
    :root {
      --bg: #f3f2ed;
      --rail: #ece9e1;
      --surface: #ffffff;
      --surface-soft: #f8f7f2;
      --selected: #ede7dc;
      --line: #ded9cc;
      --line-strong: #c9c1b0;
      --text: #221f1a;
      --muted: #6f685c;
      --muted-2: #8b8375;
      --active: #27704e;
      --warn: #986519;
      --danger: #aa3d32;
      --focus: #77613a;
      --button: #26231d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Aptos", "IBM Plex Sans", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 220px minmax(560px, 1fr) 360px;
      height: 100vh;
      min-height: 640px;
    }

    .sidebar {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--rail);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
    }

    .product {
      padding: 8px 10px 14px;
      font-size: 15px;
      font-weight: 680;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav button {
      width: 100%;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: #3a352c;
      text-align: left;
      padding: 0 10px;
    }

    .nav button:hover {
      background: #f5f2eb;
    }

    .nav button[aria-current="page"] {
      background: #fbfaf7;
      border-color: var(--line);
      color: var(--text);
      font-weight: 620;
    }

    .sidebar-meta {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding: 12px 10px 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      min-width: 0;
      background: var(--surface);
    }

    .page-bar {
      min-height: 56px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      background: var(--surface);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 18px;
      line-height: 1.25;
      font-weight: 680;
    }

    .summary {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
      padding: 12px 20px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .search-input,
    .select-input {
      height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search-input {
      width: 100%;
      padding: 0 10px;
    }

    .select-input {
      min-width: 138px;
      padding: 0 28px 0 10px;
    }

    .search-input:focus,
    .select-input:focus,
    .segment-button:focus-visible,
    .btn:focus-visible,
    tr:focus-visible {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(119, 97, 58, 0.18);
      outline: none;
    }

    .segments {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      display: flex;
      gap: 4px;
      padding: 9px 20px;
      overflow-x: auto;
    }

    .segment-button {
      height: 30px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: #3d382f;
      padding: 0 10px;
      white-space: nowrap;
    }

    .segment-button:hover {
      background: var(--surface-soft);
    }

    .segment-button.is-active {
      background: var(--selected);
      border-color: var(--line);
      font-weight: 620;
    }

    .table-wrap {
      min-height: 0;
      overflow: auto;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    th,
    td {
      text-align: left;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      height: 32px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 0 10px;
    }

    tbody td {
      height: 50px;
      border-bottom: 1px solid var(--line);
      padding: 6px 10px;
      vertical-align: middle;
      overflow: hidden;
    }

    tbody tr {
      background: var(--surface);
    }

    tbody tr:hover {
      background: #faf9f5;
    }

    tbody tr.is-selected {
      background: var(--selected);
    }

    .subscriber-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border: 1px solid #d4cab9;
      border-radius: 50%;
      background: #e2dbce;
      color: #312a20;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 680;
    }

    .identity,
    .cell-stack {
      min-width: 0;
    }

    .name,
    .primary-line {
      color: var(--text);
      font-weight: 590;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .email,
    .secondary-line {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .money,
    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .status {
      font-weight: 620;
    }

    .status-active {
      color: var(--active);
    }

    .status-past-due {
      color: var(--danger);
    }

    .status-canceling,
    .status-paused {
      color: var(--warn);
    }

    .empty {
      padding: 28px 20px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
    }

    .detail {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: var(--surface);
      overflow: auto;
    }

    .detail-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .detail-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail h2 {
      font-size: 17px;
      line-height: 1.25;
      font-weight: 680;
    }

    .detail-subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      word-break: break-word;
    }

    .detail-status {
      flex: 0 0 auto;
      padding-top: 2px;
      font-size: 13px;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
    }

    .btn:hover {
      background: var(--surface-soft);
    }

    .btn-primary {
      background: var(--button);
      border-color: var(--button);
      color: #fffdf8;
    }

    .btn-primary:hover {
      background: #343026;
    }

    .detail-section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .detail-section h3 {
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 680;
    }

    .kv {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      gap: 8px 12px;
      font-size: 13px;
      line-height: 1.35;
    }

    .kv dt {
      color: var(--muted);
    }

    .kv dd {
      min-width: 0;
      margin: 0;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .note-box {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 9px 10px;
      background: var(--surface-soft);
      color: var(--text);
      line-height: 1.4;
      outline: none;
    }

    .note-box:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(119, 97, 58, 0.18);
    }

    .activity {
      display: flex;
      flex-direction: column;
      gap: 9px;
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 13px;
      line-height: 1.35;
    }

    .activity li {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 8px;
    }

    .activity time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 192px minmax(500px, 1fr) 330px;
      }

      .toolbar {
        grid-template-columns: 1fr 138px 138px;
      }
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .detail {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .select-input {
        width: 100%;
      }

      .table-wrap {
        max-height: 560px;
      }
    }
  </style>
</head>

          </thead>
          <tbody id="subscriberRows"></tbody>
        </table>
      </section>
    </main>

        email: "owen@maplequarter.com",
        company: "Maple Quarter",
        initials: "OP",
        segment: "Operators",
        plan: "Monthly Pro",
        renewal: "2026-06-25",
        mrr: 24,
        status: "Active",
        seats: 1,
        joined: "2026-02-25",
        payment: "Visa ending 6044",
        invoices: "Paid May 25, 2026",
        source: "LinkedIn post",
        notes: "Reads on mobile. No support history.",
        activity: [
          ["Jun 9", "Opened mobile issue"],
          ["May 25", "Invoice paid for Monthly Pro"],
          ["May 11", "Clicked pricing teardown"]
        ]
      },
      {
        id: "sub_1015",
        name: "Leah Kim",
        email: "leah@foundrynine.com",
        company: "Foundry Nine",
        initials: "LK",
        segment: "Teams",
        plan: "Team",
        renewal: "2026-06-30",
        mrr: 112,
        status: "Canceling",
        seats: 7,
        joined: "2025-06-30",
        payment: "Bank debit",
        invoices: "Paid Jun 30, 2025",
        source: "Sales-assisted import",
        notes: "Finance requested export of historical invoices before plan ends.",
        activity: [
          ["Jun 10", "Cancelation confirmed by owner"],
          ["Jun 8", "Exported invoices"],
          ["May 30", "Renewal reminder opened"]
        ]
      },
      {
        id: "sub_1016",
        name: "Daniel Foster",
        email: "daniel@copperbench.com",
        company: "Copper Bench",
        initials: "DF",
        segment: "Renewing soon",
        plan: "Annual Pro",
        renewal: "2026-06-15",
        mrr: 42,
        status: "Active",
        seats: 1,
        joined: "2024-06-15",
        payment: "Mastercard ending 7733",
        invoices: "Paid Jun 15, 2025",
        source: "Archive preview",
        notes: "Renewal in five days. Last opened paid issue on June 2.",
        activity: [
          ["Jun 10", "Renewal reminder delivered"],
          ["Jun 2", "Opened paid issue"],
          ["May 15", "Invoice preview generated"]
        ]
      }
    ];

    const state = {
      query: "",
      segment: "All",
      plan: "All",
      status: "All",
      selectedId: "sub_1002"
    };

    const rowsEl = document.querySelector("#subscriberRows");
    const detailEl = document.querySelector("#detailPanel");
    const summaryEl = document.querySelector("#summary");
    const searchEl = document.querySelector("#search");
    const planEl = document.querySelector("#planFilter");
    const statusEl = document.querySelector("#statusFilter");
    const segmentButtons = Array.from(document.querySelectorAll(".segment-button"));

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    const dateFormat = new Intl.DateTimeFormat("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function displayDate(value) {
      return dateFormat.format(new Date(`${value}T00:00:00`));
    }

    function statusClass(status) {
      return `status-${status.toLowerCase().replace(/\s+/g, "-")}`;
    }

    function filteredSubscribers() {
      const query = state.query.trim().toLowerCase();
      return subscribers.filter((subscriber) => {
        const haystack = [
          subscriber.name,
          subscriber.email,
          subscriber.company,
          subscriber.segment,
          subscriber.plan,
          subscriber.status
        ].join(" ").toLowerCase();

        const matchesQuery = !query || haystack.includes(query);
        const matchesSegment = state.segment === "All" || subscriber.segment === state.segment;
        const matchesPlan = state.plan === "All" || subscriber.plan === state.plan;
        const matchesStatus = state.status === "All" || subscriber.status === state.status;

        return matchesQuery && matchesSegment && matchesPlan && matchesStatus;
      });
    }

    function renderSummary(rows) {
      const mrr = rows.reduce((sum, subscriber) => sum + subscriber.mrr, 0);
      const pastDue = rows.filter((subscriber) => subscriber.status === "Past due").length;
      const canceling = rows.filter((subscriber) => subscriber.status === "Canceling").length;
      summaryEl.textContent = `${rows.length} shown · ${money.format(mrr)} MRR · ${pastDue} past due · ${canceling} canceling`;
    }

    function renderRows(rows) {
      if (!rows.length) {
        rowsEl.innerHTML = `<tr><td class="empty" colspan="6">No subscribers match the current filters.</td></tr>`;
        return;
      }

      rowsEl.innerHTML = rows.map((subscriber) => {
        const selected = subscriber.id === state.selectedId ? " is-selected" : "";
        return `
          <tr class="${selected}" data-id="${escapeHtml(subscriber.id)}" tabindex="0">
            <td>
              <div class="subscriber-cell">
                <div class="avatar" aria-hidden="true">${escapeHtml(subscriber.initials)}</div>
                <div class="identity">
                  <div class="name">${escapeHtml(subscriber.name)}</div>
                  <div class="email">${escapeHtml(subscriber.email)}</div>
                </div>
              </div>
            </td>
            <td>${escapeHtml(subscriber.segment)}</td>
            <td>
              <div class="cell-stack">
                <div class="primary-line">${escapeHtml(subscriber.plan)}</div>
                <div class="secondary-line">${subscriber.seats} ${subscriber.seats === 1 ? "seat" : "seats"}</div>
              </div>
            </td>
            <td>
              <div class="cell-stack">
                <div class="primary-line">${displayDate(subscriber.renewal)}</div>
                <div class="secondary-line">${escapeHtml(subscriber.company)}</div>
              </div>
            </td>
            <td class="money">${money.format(subscriber.mrr)}</td>
            <td><div class="status ${statusClass(subscriber.status)}">${escapeHtml(subscriber.status)}</div></td>
          </tr>
        `;
      }).join("");
    }

    function renderDetail(selected) {
      if (!selected) {
        detailEl.innerHTML = `
          <div class="detail-head">
            <h2>No subscriber selected</h2>
            <p class="detail-subline">Select a row to view account details.</p>
          </div>
        `;
        return;
      }

      detailEl.innerHTML = `
        <div class="detail-head">
          <div class="detail-title-row">
            <div>
              <h2>${escapeHtml(selected.name)}</h2>
              <p class="detail-subline">${escapeHtml(selected.email)}</p>
              <p class="detail-subline">${escapeHtml(selected.company)}</p>
            </div>
            <div class="detail-status status ${statusClass(selected.status)}">${escapeHtml(selected.status)}</div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="button">Open account</button>
            <button class="btn" type="button">Email</button>
            <button class="btn" type="button">Record note</button>
          </div>
        </div>

        <section class="detail-section">
          <h3>Subscription</h3>
          <dl class="kv">
            <dt>Plan</dt>
            <dd>${escapeHtml(selected.plan)}</dd>
            <dt>MRR</dt>
            <dd>${money.format(selected.mrr)}</dd>
            <dt>Seats</dt>
            <dd>${selected.seats}</dd>
            <dt>Renewal</dt>
            <dd>${displayDate(selected.renewal)}</dd>
            <dt>Joined</dt>
            <dd>${displayDate(selected.joined)}</dd>
            <dt>Segment</dt>
            <dd>${escapeHtml(selected.segment)}</dd>
          </dl>
        </section>

        <section class="detail-section">
          <h3>Billing</h3>
          <dl class="kv">
            <dt>Payment</dt>
            <dd>${escapeHtml(selected.payment)}</dd>
            <dt>Latest invoice</dt>
            <dd>${escapeHtml(selected.invoices)}</dd>
            <dt>Acquisition</dt>
            <dd>${escapeHtml(selected.source)}</dd>
          </dl>
        </section>

        <section class="detail-section">
          <h3>Operator notes</h3>
          <textarea class="note-box" aria-label="Operator notes">${escapeHtml(selected.notes)}</textarea>
        </section>

        <section class="detail-section">
          <h3>Recent activity</h3>
          <ul class="activity">
            ${selected.activity.map(([date, text]) => `
              <li>
                <time>${escapeHtml(date)}</time>
                <div>${escapeHtml(text)}</div>
              </li>
            `).join("")}
          </ul>
        </section>
      `;
    }

    function render() {
      const rows = filteredSubscribers();
      if (rows.length && !rows.some((subscriber) => subscriber.id === state.selectedId)) {
        state.selectedId = rows[0].id;
      }

      const selected = subscribers.find((subscriber) => subscriber.id === state.selectedId);
      renderSummary(rows);
      renderRows(rows);
      renderDetail(rows.length ? selected : null);
    }

    searchEl.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    planEl.addEventListener("change", (event) => {
      state.plan = event.target.value;
      render();
    });

    statusEl.addEventListener("change", (event) => {
      state.status = event.target.value;
      render();
    });

    segmentButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.segment = button.dataset.segment;
        segmentButtons.forEach((item) => item.classList.toggle("is-active", item === button));
        render();
      });
    });

    rowsEl.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-id]");
      if (!row) return;
      state.selectedId = row.dataset.id;
      render();
    });

    rowsEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest("tr[data-id]");
      if (!row) return;
      event.preventDefault();
      state.selectedId = row.dataset.id;
      render();
    });

    render();
  </script>
</body>
</html>
