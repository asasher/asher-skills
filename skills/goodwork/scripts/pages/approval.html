<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goodwork Approval</title>
  <style>
    *{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f5f0;color:#20211f}
    main{max-width:780px;margin:0 auto;padding:18px}.panel{background:#fff;border:1px solid #dedbd2;border-radius:8px;padding:16px}
    h1{font-size:1.45rem;margin:0 0 12px}.meta{display:grid;gap:8px;margin:12px 0;color:#4d504b}.meta div{overflow-wrap:anywhere}
    .actions{display:grid;gap:10px;margin-top:16px}button{min-height:44px;border:0;border-radius:7px;padding:10px 12px;font-weight:650}
    .approve{background:#196b4d;color:#fff}.edit{background:#244b74;color:#fff}.reject{background:#8a2727;color:#fff}
    textarea{width:100%;min-height:96px;border:1px solid #c9c5bb;border-radius:7px;padding:10px;font:inherit}
    fieldset{border:1px solid #dedbd2;border-radius:8px;margin:14px 0 0;padding:10px}label{display:block;padding:8px 0}
    @media(min-width:680px){.actions{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
<main>
  <section class="panel">
    <h1 id="title">Approval</h1>
    <div class="meta">
      <div><strong>Artifact:</strong> <span id="item"></span></div>
      <div><strong>Channel:</strong> <span id="channel"></span></div>
      <div><strong>Destination:</strong> <span id="destination"></span></div>
      <div><strong>Content hash:</strong> <code id="hash"></code></div>
      <div><strong>Requested action:</strong> validate this exact content before execution</div>
    </div>
    <fieldset id="batch"></fieldset>
    <label for="reason"><strong>Reject or edit reason</strong></label>
    <textarea id="reason" placeholder="Required for reject; optional for edit-then-approve"></textarea>
    <div class="actions">
      <button class="approve" data-action="approve">Approve</button>
      <button class="edit" data-action="edit_then_approve">Edit then approve</button>
      <button class="reject" data-action="reject">Reject</button>
    </div>
    <p id="status" role="status"></p>
  </section>
</main>
<script>
const data = __GOODWORK_BOOTSTRAP__;
const item = data.item || {};
const typeFor = {approve:"approval_requested", reject:"rejection_requested", edit_then_approve:"edit_then_approve_requested"};
document.getElementById("title").textContent = item.title || "Approval";
document.getElementById("item").textContent = item.id || "";
document.getElementById("channel").textContent = item.channel || "manual";
document.getElementById("destination").textContent = item.destination || "manual";
document.getElementById("hash").textContent = item.content_hash || "missing";
const batch = document.getElementById("batch");
batch.innerHTML = "<legend>Batch</legend>";
(data.items || []).forEach((it, idx) => {
  const id = `batch_${idx}`;
  const checked = it.id === item.id ? "checked" : "";
  batch.insertAdjacentHTML("beforeend", `<label><input type="checkbox" id="${id}" ${checked} data-item="${it.id || ""}" data-hash="${it.content_hash || ""}"> ${it.title || it.id}</label>`);
});
async function submit(action) {
  const checked = [...batch.querySelectorAll("input:checked")];
  const covers = checked.map(el => ({item_id: el.dataset.item, content_hash: el.dataset.hash})).filter(x => x.item_id);
  const reason = document.getElementById("reason").value.trim();
  if (action === "reject" && !reason) { document.getElementById("status").textContent = "Reason required."; return; }
  const event = {
    token: data.token,
    type: covers.length > 1 && action === "approve" ? "batch_approval_requested" : typeFor[action],
    page: "approval",
    item_id: covers.length > 1 ? null : (item.id || null),
    content_hash: covers.length > 1 ? null : (item.content_hash || null),
    granularity: covers.length > 1 ? "session_batch" : "item",
    covers,
    payload: {action, reason: reason || null},
    tags: ["approval"]
  };
  const res = await fetch("/event", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(event)});
  document.getElementById("status").textContent = res.ok ? `Recorded ${JSON.stringify(await res.json())}` : `Failed: ${await res.text()}`;
}
document.querySelectorAll("button[data-action]").forEach(btn => btn.addEventListener("click", () => submit(btn.dataset.action)));
</script>
</body>
</html>
