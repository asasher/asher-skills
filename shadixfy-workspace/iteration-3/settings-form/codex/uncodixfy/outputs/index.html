<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #ffffff;
        --surface-muted: #f1f1ef;
        --text: #1f1f1f;
        --muted: #62625d;
        --border: #d8d8d2;
        --border-strong: #b9b9b1;
        --primary: #0f766e;
        --primary-hover: #115e59;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 15px;
        line-height: 1.45;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .page-shell {
        min-height: 100vh;
      }

      .topbar {
        height: 56px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .settings-layout {
        display: grid;
        grid-template-columns: 232px minmax(0, 760px);
        gap: 32px;
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .side-nav {
        border-right: 1px solid var(--border);
        padding-right: 16px;
      }

      .side-nav a {
        display: block;
        border-radius: 8px;
        color: var(--muted);
        padding: 8px 10px;
        text-decoration: none;
        transition: background-color 150ms ease, color 150ms ease;
      }

      .side-nav a:hover,
      .side-nav a:focus-visible {
        background: var(--surface-muted);
        color: var(--text);
        outline: none;
      }

      .side-nav a[aria-current="page"] {
        background: var(--surface);
        box-shadow: inset 0 0 0 1px var(--border);
        color: var(--text);
        font-weight: 500;
      }

      .content {
        min-width: 0;
      }

      .page-title {
        margin: 0 0 18px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .settings-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .settings-section {
        padding: 22px 24px 24px;
      }

      .settings-section + .settings-section {
        border-top: 1px solid var(--border);
      }

      .section-title {
        margin: 0 0 16px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .form-grid {
        display: grid;
        gap: 16px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .field-label {
        color: var(--text);
        font-weight: 500;
        padding-top: 9px;
      }

      .text-input,
      .textarea-input {
        width: 100%;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 9px 10px;
        outline: none;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .text-input:focus,
      .textarea-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      .textarea-input {
        min-height: 108px;
        resize: vertical;
      }

      .field-note {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .preference-list {
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .preference-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 16px;
      }

      .preference-item + .preference-item {
        border-top: 1px solid var(--border);
      }

      .preference-name {
        display: block;
        font-weight: 500;
      }

      .preference-description {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 13px;
      }

      .toggle-input {
        height: 1px;
        width: 1px;
        margin: -1px;
        overflow: hidden;
        position: absolute;
        clip: rect(0 0 0 0);
      }

      .toggle-track {
        position: relative;
        flex: 0 0 auto;
        height: 24px;
        width: 44px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: #e6e6e1;
        cursor: pointer;
        transition: background-color 150ms ease, border-color 150ms ease;
      }

      .toggle-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--surface);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
        transition: left 150ms ease;
      }

      .toggle-input:checked + .toggle-track {
        border-color: var(--primary);
        background: var(--primary);
      }

      .toggle-input:checked + .toggle-track::after {
        left: 23px;
      }

      .toggle-input:focus-visible + .toggle-track {
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
      }

      .action-bar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .button {
        border-radius: 8px;
        border: 1px solid var(--border-strong);
        min-height: 38px;
        padding: 8px 13px;
        font-weight: 500;
        transition: background-color 150ms ease, border-color 150ms ease;
      }

      .button-secondary {
        background: var(--surface);
        color: var(--text);
      }

      .button-secondary:hover,
      .button-secondary:focus-visible {
        background: var(--surface-muted);
        outline: none;
      }

      .button-primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }

      .button-primary:hover,
      .button-primary:focus-visible {
        border-color: var(--primary-hover);
        background: var(--primary-hover);
        outline: none;
      }

      @media (max-width: 820px) {
        .settings-layout {
          grid-template-columns: 1fr;
          width: min(100% - 32px, 760px);
          gap: 18px;
          padding-top: 20px;
        }

        .side-nav {
          border-right: 0;
          border-bottom: 1px solid var(--border);
          padding: 0 0 12px;
        }

        .side-nav nav {
          display: flex;
          gap: 6px;
          overflow-x: auto;
          padding-bottom: 2px;
        }

        .side-nav a {
          white-space: nowrap;
        }

        .field-row {
          grid-template-columns: 1fr;
          gap: 7px;
        }

        .field-label {
          padding-top: 0;
        }
      }

      @media (max-width: 520px) {
        .topbar {
          height: 52px;
        }

        .settings-layout {
          width: calc(100% - 24px);
          padding-bottom: 28px;
        }

        .settings-section {
          padding: 18px 16px;
        }

        .preference-item {
          align-items: flex-start;
          padding: 13px 14px;
        }

        .action-bar {
          flex-direction: column-reverse;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="mx-auto flex h-full w-[min(1120px,calc(100vw-48px))] items-center justify-between max-[520px]:w-[calc(100%-24px)]">
          <a class="text-[15px] font-semibold text-[var(--text)] no-underline" href="#">Acme</a>
          <button class="button button-secondary" type="button">Sign out</button>
        </div>
      </header>

      <main class="settings-layout">
        <aside class="side-nav" aria-label="Settings navigation">
          <nav>
            <a href="#" aria-current="page">Account</a>
            <a href="#">Team</a>
            <a href="#">Billing</a>
            <a href="#">Integrations</a>
            <a href="#">Security</a>
          </nav>
        </aside>

        <section class="content" aria-labelledby="settings-title">
          <h1 class="page-title" id="settings-title">Account settings</h1>

          <form>
            <div class="settings-card">
              <section class="settings-section" aria-labelledby="profile-title">
                <h2 class="section-title" id="profile-title">Profile</h2>
                <div class="form-grid">
                  <div class="field-row">
                    <label class="field-label" for="name">Name</label>
                    <div>
                      <input
                        class="text-input"
                        id="name"
                        name="name"
                        type="text"
                        autocomplete="name"
                        value="Maya Chen"
                      />
                    </div>
                  </div>

                  <div class="field-row">
                    <label class="field-label" for="email">Email</label>
                    <div>
                      <input
                        class="text-input"
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        value="maya.chen@example.com"
                      />
                      <p class="field-note">Used for login, receipts, and security messages.</p>
                    </div>
                  </div>

                  <div class="field-row">
                    <label class="field-label" for="bio">Bio</label>
                    <div>
                      <textarea class="textarea-input" id="bio" name="bio">Product lead focused on customer workflows and internal tools.</textarea>
                    </div>
                  </div>
                </div>
              </section>

              <section class="settings-section" aria-labelledby="password-title">
                <h2 class="section-title" id="password-title">Password</h2>
                <div class="form-grid">
                  <div class="field-row">
                    <label class="field-label" for="current-password">Current password</label>
                    <div>
                      <input
                        class="text-input"
                        id="current-password"
                        name="current-password"
                        type="password"
                        autocomplete="current-password"
                      />
                    </div>
                  </div>

                  <div class="field-row">
                    <label class="field-label" for="new-password">New password</label>
                    <div>
                      <input
                        class="text-input"
                        id="new-password"
                        name="new-password"
                        type="password"
                        autocomplete="new-password"
                      />
                      <p class="field-note">Use at least 12 characters.</p>
                    </div>
                  </div>

                  <div class="field-row">
                    <label class="field-label" for="confirm-password">Confirm password</label>
                    <div>
                      <input
                        class="text-input"
                        id="confirm-password"
                        name="confirm-password"
                        type="password"
                        autocomplete="new-password"
                      />
                    </div>
                  </div>
                </div>
              </section>

              <section class="settings-section" aria-labelledby="notifications-title">
                <h2 class="section-title" id="notifications-title">Notifications</h2>
                <div class="preference-list">
                  <label class="preference-item" for="security-alerts">
                    <span>
                      <span class="preference-name">Security alerts</span>
                      <span class="preference-description">Login attempts, password changes, and recovery activity.</span>
                    </span>
                    <input class="toggle-input" id="security-alerts" name="security-alerts" type="checkbox" checked />
                    <div class="toggle-track" aria-hidden="true"></div>
                  </label>

                  <label class="preference-item" for="billing-reminders">
                    <span>
                      <span class="preference-name">Billing reminders</span>
                      <span class="preference-description">Invoices, payment failures, and plan changes.</span>
                    </span>
                    <input class="toggle-input" id="billing-reminders" name="billing-reminders" type="checkbox" checked />
                    <div class="toggle-track" aria-hidden="true"></div>
                  </label>

                  <label class="preference-item" for="product-updates">
                    <span>
                      <span class="preference-name">Product updates</span>
                      <span class="preference-description">Release notes and account-related feature changes.</span>
                    </span>
                    <input class="toggle-input" id="product-updates" name="product-updates" type="checkbox" />
                    <div class="toggle-track" aria-hidden="true"></div>
                  </label>

                  <label class="preference-item" for="weekly-summary">
                    <span>
                      <span class="preference-name">Weekly summary</span>
                      <span class="preference-description">A short recap of account activity and pending items.</span>
                    </span>
                    <input class="toggle-input" id="weekly-summary" name="weekly-summary" type="checkbox" />
                    <div class="toggle-track" aria-hidden="true"></div>
                  </label>
                </div>
              </section>
            </div>

            <div class="action-bar">
              <button class="button button-secondary" type="reset">Cancel</button>
              <button class="button button-primary" type="submit">Save changes</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
