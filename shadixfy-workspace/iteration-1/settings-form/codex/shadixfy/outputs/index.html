<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Geist", "sans-serif"],
            mono: ["Geist Mono", "monospace"]
          },
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))"
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))"
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))"
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))"
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))"
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))"
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))"
            }
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)"
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 10% 3.9%;
      --radius: 0.5rem;
    }

    * {
      border-color: hsl(var(--border));
    }

    body {
      min-height: 100vh;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: "Geist", sans-serif;
    }

    .switch-input:checked + .switch-track {
      background: hsl(var(--primary));
    }

    .switch-input:checked + .switch-track .switch-thumb {
      left: 1.25rem;
    }
  </style>
</head>
<body>
  <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-6 sm:px-6 lg:px-8">
    <header class="mb-6 flex flex-col gap-4 border-b pb-6 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl font-semibold tracking-normal text-foreground">Account settings</h1>
      </div>
      <div class="hidden items-center gap-2 sm:flex">
        <button type="reset" form="account-settings" class="inline-flex h-9 items-center justify-center rounded-md border border-input bg-background px-4 text-sm font-medium text-foreground transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
          Cancel
        </button>
        <button type="submit" form="account-settings" class="inline-flex h-9 items-center justify-center rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
          Save changes
        </button>
      </div>
    </header>

    <form id="account-settings" class="grid gap-6 lg:grid-cols-[15rem_1fr]" onsubmit="event.preventDefault()">
      <aside class="hidden lg:block">
        <nav class="sticky top-6 flex flex-col gap-1 text-sm">
          <a href="#profile" class="rounded-md bg-accent px-3 py-2 font-medium text-accent-foreground transition-colors">Profile</a>
          <a href="#password" class="rounded-md px-3 py-2 text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground">Password</a>
          <a href="#notifications" class="rounded-md px-3 py-2 text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground">Notifications</a>
        </nav>
      </aside>

      <div class="space-y-6">
        <section id="profile" class="rounded-lg border bg-card text-card-foreground shadow-sm">
          <div class="border-b p-6">
            <h2 class="text-lg font-semibold tracking-normal">Profile</h2>
          </div>
          <div class="grid gap-5 p-6">
            <div class="grid gap-2">
              <label for="name" class="text-sm font-medium leading-none text-foreground">Name</label>
              <input id="name" name="name" type="text" value="Jordan Lee" autocomplete="name" class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background" />
            </div>
            <div class="grid gap-2">
              <label for="email" class="text-sm font-medium leading-none text-foreground">Email</label>
              <input id="email" name="email" type="email" value="jordan@example.com" autocomplete="email" class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background" />
            </div>
            <div class="grid gap-2">
              <label for="bio" class="text-sm font-medium leading-none text-foreground">Bio</label>
              <textarea id="bio" name="bio" rows="4" class="flex min-h-24 w-full resize-y rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">Product lead focused on operations, systems, and clear customer communication.</textarea>
            </div>
          </div>
        </section>

        <section id="password" class="rounded-lg border bg-card text-card-foreground shadow-sm">
          <div class="border-b p-6">
            <h2 class="text-lg font-semibold tracking-normal">Password</h2>
          </div>
          <div class="grid gap-5 p-6">
            <div class="grid gap-2">
              <label for="current-password" class="text-sm font-medium leading-none text-foreground">Current password</label>
              <input id="current-password" name="current-password" type="password" autocomplete="current-password" class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background" />
            </div>
            <div class="grid gap-2 sm:grid-cols-2 sm:gap-4">
              <div class="grid gap-2">
                <label for="new-password" class="text-sm font-medium leading-none text-foreground">New password</label>
                <input id="new-password" name="new-password" type="password" autocomplete="new-password" class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background" />
              </div>
              <div class="grid gap-2">
                <label for="confirm-password" class="text-sm font-medium leading-none text-foreground">Confirm password</label>
                <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background" />
              </div>
            </div>
          </div>
        </section>

        <section id="notifications" class="rounded-lg border bg-card text-card-foreground shadow-sm">
          <div class="border-b p-6">
            <h2 class="text-lg font-semibold tracking-normal">Notifications</h2>
          </div>
          <div class="divide-y">
            <div class="flex items-center justify-between gap-4 p-6">
              <div class="space-y-1">
                <label for="account-updates" class="text-sm font-medium leading-none text-foreground">Account updates</label>
                <p class="text-sm text-muted-foreground">Email me when important account details change.</p>
              </div>
              <label class="relative inline-flex h-6 w-10 shrink-0 cursor-pointer items-center">
                <input id="account-updates" name="account-updates" type="checkbox" class="switch-input peer sr-only" checked />
                <span class="switch-track h-6 w-10 rounded-full bg-input transition-colors peer-focus-visible:outline-none peer-focus-visible:ring-2 peer-focus-visible:ring-ring peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-background">
                  <span class="switch-thumb absolute left-1 top-1 h-4 w-4 rounded-full bg-background shadow-sm"></span>
                </span>
              </label>
            </div>
            <div class="flex items-center justify-between gap-4 p-6">
              <div class="space-y-1">
                <label for="security-alerts" class="text-sm font-medium leading-none text-foreground">Security alerts</label>
                <p class="text-sm text-muted-foreground">Notify me about sign-ins and password activity.</p>
              </div>
              <label class="relative inline-flex h-6 w-10 shrink-0 cursor-pointer items-center">
                <input id="security-alerts" name="security-alerts" type="checkbox" class="switch-input peer sr-only" checked />
                <span class="switch-track h-6 w-10 rounded-full bg-input transition-colors peer-focus-visible:outline-none peer-focus-visible:ring-2 peer-focus-visible:ring-ring peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-background">
                  <span class="switch-thumb absolute left-1 top-1 h-4 w-4 rounded-full bg-background shadow-sm"></span>
                </span>
              </label>
            </div>
            <div class="flex items-center justify-between gap-4 p-6">
              <div class="space-y-1">
                <label for="product-news" class="text-sm font-medium leading-none text-foreground">Product news</label>
                <p class="text-sm text-muted-foreground">Send occasional announcements and release notes.</p>
              </div>
              <label class="relative inline-flex h-6 w-10 shrink-0 cursor-pointer items-center">
                <input id="product-news" name="product-news" type="checkbox" class="switch-input peer sr-only" />
                <span class="switch-track h-6 w-10 rounded-full bg-input transition-colors peer-focus-visible:outline-none peer-focus-visible:ring-2 peer-focus-visible:ring-ring peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-background">
                  <span class="switch-thumb absolute left-1 top-1 h-4 w-4 rounded-full bg-background shadow-sm"></span>
                </span>
              </label>
            </div>
          </div>
        </section>

        <div class="flex items-center justify-end gap-2 border-t pt-6 sm:hidden">
          <button type="reset" class="inline-flex h-9 items-center justify-center rounded-md border border-input bg-background px-4 text-sm font-medium text-foreground transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
            Cancel
          </button>
          <button type="submit" class="inline-flex h-9 items-center justify-center rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
            Save changes
          </button>
        </div>
      </div>
    </form>
  </main>
</body>
</html>
